<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}QuizNote{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #09090b;
            --bg-card: rgba(255,255,255,0.03);
            --bg-hover: rgba(255,255,255,0.06);
            --bg-glass: rgba(255,255,255,0.035);
            --border: rgba(255,255,255,0.07);
            --border-glow: rgba(255,255,255,0.12);
            --text: #f4f4f5;
            --text-secondary: #a1a1aa;
            --text-dim: #71717a;
            --accent: #818cf8;
            --accent-glow: rgba(129,140,248,0.25);
            --green: #34d399;
            --green-bg: rgba(52,211,153,0.1);
            --red: #f87171;
            --red-bg: rgba(248,113,113,0.1);
            --amber: #fbbf24;
            --amber-bg: rgba(251,191,36,0.1);
            --purple: #a78bfa;
            --purple-bg: rgba(167,139,250,0.1);
            --radius: 12px;
            --radius-sm: 8px;
            --sidebar-w: 340px;
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Animated gradient orbs */
        body::before {
            content: '';
            position: fixed;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(129,140,248,0.07) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(52,211,153,0.05) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(167,139,250,0.05) 0%, transparent 50%);
            pointer-events: none; z-index: 0;
            animation: orb-drift 20s ease-in-out infinite;
        }
        @keyframes orb-drift {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(1%, 0.5%) rotate(1deg); }
            66% { transform: translate(-0.5%, -1%) rotate(-1deg); }
        }

        /* ---- Layout ---- */
        .app-layout {
            display: flex; height: 100vh; position: relative; z-index: 1;
        }

        /* ---- Sidebar ---- */
        .sidebar {
            width: var(--sidebar-w); min-width: var(--sidebar-w);
            background: rgba(9,9,11,0.88);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-right: 1px solid var(--border);
            display: flex; flex-direction: column; height: 100vh;
        }
        .sidebar-header {
            padding: 1.25rem 1.25rem 0.4rem;
            display: flex; justify-content: space-between; align-items: baseline;
        }
        .sidebar-title {
            font-weight: 700; font-size: 0.92rem; letter-spacing: -0.01em;
            display: flex; align-items: center; gap: 0.4rem;
        }
        .sidebar-meta { font-size: 0.68rem; color: var(--text-dim); font-weight: 500; }
        .sidebar-actions {
            padding: 0.4rem 1.25rem 0.25rem;
            display: flex; justify-content: space-between; align-items: center;
        }
        .action-link {
            font-size: 0.73rem; color: var(--text-secondary); text-decoration: none;
            cursor: pointer; font-weight: 500; transition: color var(--transition);
        }
        .action-link:hover { color: var(--text); }

        /* Nav pills */
        .sidebar-nav {
            display: flex; gap: 0.3rem; padding: 0.25rem 1.25rem 0.6rem;
        }
        .nav-pill {
            padding: 0.25rem 0.65rem; border-radius: 20px; font-size: 0.7rem;
            font-weight: 600; text-decoration: none; color: var(--text-secondary);
            transition: all var(--transition); white-space: nowrap;
        }
        .nav-pill:hover { color: var(--text); background: var(--bg-hover); }
        .nav-pill.accent { color: var(--accent); background: rgba(129,140,248,0.1); }

        /* ---- Tree ---- */
        .tree-container {
            flex: 1; overflow-y: auto; padding: 0 0.75rem 0.5rem; font-size: 0.78rem;
        }
        .tree-container::-webkit-scrollbar { width: 3px; }
        .tree-container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

        .tree-dir-header {
            display: flex; align-items: center; padding: 3px 6px; cursor: pointer;
            border-radius: 6px; user-select: none; transition: background var(--transition);
        }
        .tree-dir-header:hover { background: var(--bg-hover); }
        .tree-dir-header::-webkit-details-marker { display: none; }
        .tree-dir[open] > .tree-dir-header .tree-icon { transform: rotate(90deg); }

        .tree-icon {
            display: inline-block; width: 16px; font-size: 0.58rem; color: var(--text-dim);
            transition: transform var(--transition); flex-shrink: 0; text-align: center;
        }
        .file-icon { font-size: 0.7rem; }
        .tree-children { padding-left: 14px; border-left: 1px solid rgba(255,255,255,0.04); margin-left: 7px; }

        .tree-file {
            display: flex; align-items: center; padding: 3px 6px; cursor: pointer;
            border-radius: 6px; transition: background var(--transition);
        }
        .tree-file:hover { background: var(--bg-hover); }
        .tree-file:has(.tree-check:checked) {
            background: rgba(129,140,248,0.1); box-shadow: inset 0 0 0 1px rgba(129,140,248,0.12);
        }
        .tree-check {
            width: 13px; height: 13px; margin-right: 5px; cursor: pointer;
            accent-color: var(--accent); flex-shrink: 0;
        }
        .tree-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .tree-count { font-size: 0.65rem; color: var(--text-dim); margin-left: 0.25rem; font-weight: 500; }
        .tree-ext { font-size: 0.6rem; color: var(--text-dim); margin-left: 0.12rem; font-weight: 500; }

        /* ---- Generate bar ---- */
        .generate-bar {
            padding: 0.7rem 1rem; border-top: 1px solid var(--border);
            background: rgba(9,9,11,0.92); backdrop-filter: blur(12px);
        }
        .generate-row { display: flex; gap: 0.35rem; margin-bottom: 0.5rem; }
        .gen-select {
            flex: 1; padding: 0.4rem 0.45rem;
            background: rgba(255,255,255,0.04); color: var(--text);
            border: 1px solid var(--border); border-radius: var(--radius-sm);
            font-size: 0.74rem; font-family: inherit; cursor: pointer;
            transition: border-color var(--transition);
        }
        .gen-select:focus { outline: none; border-color: var(--accent); }
        .flash-error {
            font-size: 0.74rem; color: var(--red); margin-bottom: 0.5rem;
            padding: 0.35rem 0.55rem; background: var(--red-bg); border-radius: var(--radius-sm);
        }

        /* ---- Buttons ---- */
        .btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 0.3rem;
            padding: 0.45rem 0.9rem; border: 1px solid var(--border);
            border-radius: var(--radius-sm); background: rgba(255,255,255,0.04);
            color: var(--text); cursor: pointer; text-decoration: none;
            font-size: 0.8rem; font-weight: 500; font-family: inherit;
            transition: all var(--transition);
        }
        .btn:hover { background: var(--bg-hover); border-color: var(--border-glow); }
        .btn-primary {
            background: var(--accent); color: #fff; border-color: var(--accent);
            font-weight: 600; box-shadow: 0 0 20px var(--accent-glow);
        }
        .btn-primary:hover { background: #9394f8; }
        .btn-success { background: var(--green); color: #000; border-color: var(--green); font-weight: 600; }
        .btn-sm { padding: 0.22rem 0.55rem; font-size: 0.72rem; border-radius: 6px; }

        /* ---- Content ---- */
        .content { flex: 1; overflow-y: auto; padding: 2rem 2.5rem; }
        .content::-webkit-scrollbar { width: 3px; }
        .content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }
        .content-header {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;
        }
        .content-header h2 { font-size: 1.1rem; font-weight: 700; letter-spacing: -0.01em; }
        .content-empty {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100%; color: var(--text-dim);
        }

        /* ---- Hero stats ---- */
        .hero-stats { display: flex; gap: 2.5rem; margin-bottom: 2.5rem; }
        .hero-stat { text-align: center; }
        .hero-stat-num { display: block; font-size: 2.5rem; font-weight: 800; letter-spacing: -0.02em; color: var(--text); }
        .hero-stat-label { font-size: 0.78rem; color: var(--text-dim); font-weight: 500; margin-top: 0.15rem; }
        .hero-stat.accent .hero-stat-num { color: var(--accent); }
        .hero-stat.green .hero-stat-num { color: var(--green); }

        .welcome-card {
            background: var(--bg-glass); backdrop-filter: blur(16px);
            border: 1px solid var(--border); border-radius: var(--radius);
            padding: 2rem 2.5rem; text-align: center; max-width: 460px;
        }

        /* ---- Question cards ---- */
        .question-list { display: flex; flex-direction: column; gap: 0.65rem; }
        .q-card {
            background: var(--bg-glass); backdrop-filter: blur(12px);
            border: 1px solid var(--border); border-radius: var(--radius);
            padding: 1.15rem; transition: border-color var(--transition);
        }
        .q-card:hover { border-color: var(--border-glow); }
        .q-card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.65rem; }
        .q-badges { display: flex; gap: 0.3rem; flex-wrap: wrap; }
        .q-question { font-weight: 600; margin-bottom: 0.65rem; line-height: 1.65; font-size: 0.92rem; }
        .q-options { display: flex; flex-wrap: wrap; gap: 0.35rem; margin-bottom: 0.65rem; }
        .q-opt {
            background: rgba(255,255,255,0.04); padding: 0.15rem 0.55rem;
            border-radius: 20px; font-size: 0.78rem; color: var(--text-secondary);
        }
        .q-code {
            background: rgba(0,0,0,0.3); padding: 0.65rem 0.9rem;
            border-radius: var(--radius-sm); font-family: 'SF Mono','Fira Code',monospace;
            font-size: 0.78rem; margin-bottom: 0.65rem; white-space: pre-wrap; overflow-x: auto;
            border: 1px solid rgba(255,255,255,0.04);
        }
        .q-answer { font-size: 0.82rem; color: var(--text-dim); cursor: pointer; }
        .q-answer summary { color: var(--accent); font-weight: 500; }
        .q-answer[open] { padding-top: 0.4rem; }

        /* ---- Badges ---- */
        .badge {
            display: inline-flex; align-items: center;
            padding: 0.12em 0.5em; border-radius: 20px;
            font-size: 0.68rem; font-weight: 600;
        }
        .badge-easy { background: var(--green-bg); color: var(--green); }
        .badge-medium { background: var(--amber-bg); color: var(--amber); }
        .badge-hard { background: var(--red-bg); color: var(--red); }
        .badge-multiple_choice, .badge-mc { background: rgba(129,140,248,0.15); color: var(--accent); }
        .badge-programming, .badge-code { background: var(--purple-bg); color: var(--purple); }
        .badge-true_false, .badge-tf { background: var(--green-bg); color: var(--green); }
        .badge-short_answer, .badge-short { background: var(--amber-bg); color: var(--amber); }
        .badge-fill_blank, .badge-fill { background: var(--red-bg); color: var(--red); }

        /* ---- Card ---- */
        .card {
            background: var(--bg-glass); backdrop-filter: blur(12px);
            border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem;
        }
        .card h2 { font-size: 0.95rem; font-weight: 700; margin-bottom: 0.65rem; }
        .card h3 { font-size: 0.88rem; font-weight: 600; margin-bottom: 0.45rem; }

        /* ---- Result ---- */
        .result-hero {
            text-align: center; padding: 3rem 2rem; margin-bottom: 2rem;
            background: var(--bg-glass); backdrop-filter: blur(16px);
            border: 1px solid var(--border); border-radius: var(--radius);
        }
        .result-score { font-size: 4rem; font-weight: 800; letter-spacing: -0.03em; line-height: 1; }
        .result-item {
            padding: 1rem 1.25rem; margin-bottom: 0.4rem;
            border-radius: var(--radius); border: 1px solid var(--border);
            background: var(--bg-glass); backdrop-filter: blur(12px);
        }
        .result-item.correct { border-left: 3px solid var(--green); }
        .result-item.wrong { border-left: 3px solid var(--red); }

        /* ---- Stats ---- */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 0.65rem; margin-bottom: 1.5rem; }
        .stat-card {
            background: var(--bg-glass); backdrop-filter: blur(12px);
            border: 1px solid var(--border); border-radius: var(--radius);
            padding: 1.1rem; text-align: center;
        }
        .stat-card .value { font-size: 1.65rem; font-weight: 800; letter-spacing: -0.02em; }
        .stat-card .label { font-size: 0.72rem; color: var(--text-dim); margin-top: 0.15rem; font-weight: 500; }

        /* ---- Progress ---- */
        .progress-bar { display: flex; align-items: center; gap: 0.5rem; }
        .progress-bar .track { flex: 1; height: 4px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden; }
        .progress-bar .fill { height: 100%; border-radius: 2px; transition: width 0.5s ease; }

        /* ---- Forms ---- */
        .form-group { margin-bottom: 0.85rem; }
        .form-group label { display: block; margin-bottom: 0.3rem; font-weight: 600; font-size: 0.82rem; color: var(--text-secondary); }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 0.5rem 0.7rem;
            background: rgba(255,255,255,0.03); color: var(--text);
            border: 1px solid var(--border); border-radius: var(--radius-sm);
            font-size: 0.82rem; font-family: inherit;
            transition: border-color var(--transition);
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--accent); }
        .form-row { display: flex; gap: 0.7rem; }
        .form-row .form-group { flex: 1; }

        /* ---- Tables ---- */
        table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
        th, td { padding: 0.55rem 0.7rem; text-align: left; border-bottom: 1px solid var(--border); }
        th { color: var(--text-dim); font-weight: 600; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.04em; }
        tr:hover td { background: var(--bg-hover); }

        /* ---- Heatmap ---- */
        .heatmap { display: flex; gap: 2px; flex-wrap: wrap; }
        .heat-cell { width: 12px; height: 12px; border-radius: 2px; }

        /* ---- Deep dive ---- */
        .depth-ring {
            width: 44px; height: 44px; border-radius: 50%;
            border: 2.5px solid var(--accent);
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; font-size: 1rem; color: var(--accent);
        }
        .history-item {
            padding: 0.5rem 0.75rem; margin-bottom: 0.25rem;
            background: var(--bg-glass); border-radius: var(--radius-sm);
            border-left: 2px solid var(--border); font-size: 0.8rem;
        }
        .history-item .depth-q { color: var(--accent); font-weight: 600; }

        /* ---- Present ---- */
        .section-card {
            background: var(--bg-glass); backdrop-filter: blur(12px);
            border: 1px solid var(--border); border-radius: var(--radius);
            padding: 1.4rem; margin-bottom: 1.1rem;
        }
        .section-card h3 { font-size: 0.95rem; font-weight: 700; margin-bottom: 0.4rem; }
        .section-prompt { color: var(--accent); font-size: 0.82rem; margin-bottom: 0.65rem; font-weight: 500; }
        .keyword-tag {
            display: inline-block; padding: 0.12em 0.45em; border-radius: 20px;
            font-size: 0.7rem; background: rgba(255,255,255,0.04); color: var(--text-secondary); margin: 0.12rem;
        }

        /* ---- Option radio ---- */
        .option-radio {
            display: flex; align-items: center;
            padding: 0.55rem 0.8rem; margin-bottom: 0.3rem;
            background: var(--bg-glass); border: 1px solid var(--border);
            border-radius: var(--radius-sm); cursor: pointer; font-size: 0.87rem;
            transition: all var(--transition);
        }
        .option-radio:hover { border-color: var(--border-glow); background: var(--bg-hover); }
        .option-radio:has(input:checked) { border-color: var(--accent); background: rgba(129,140,248,0.08); }
        .option-radio input { margin-right: 0.5rem; accent-color: var(--accent); }

        /* ---- Alerts ---- */
        .alert {
            padding: 0.65rem 0.9rem; border-radius: var(--radius-sm); margin-bottom: 0.85rem;
            font-size: 0.82rem; font-weight: 500;
        }
        .alert-error { background: var(--red-bg); color: var(--red); border: 1px solid rgba(248,113,113,0.2); }
        .alert-success { background: var(--green-bg); color: var(--green); border: 1px solid rgba(52,211,153,0.2); }
        .alert-info { background: rgba(129,140,248,0.1); color: var(--accent); border: 1px solid rgba(129,140,248,0.2); }

        /* ---- SRS banner ---- */
        .srs-banner {
            display: flex; align-items: center; gap: 0.4rem;
            padding: 0.5rem 0.9rem; margin-bottom: 0.85rem;
            background: var(--bg-glass); backdrop-filter: blur(12px);
            border: 1px solid var(--border); border-radius: var(--radius-sm);
            font-size: 0.78rem; color: var(--text-secondary);
        }
        .srs-banner strong { color: var(--text); }
    </style>
</head>
<body>
    {% block content %}{% endblock %}
</body>
</html>
